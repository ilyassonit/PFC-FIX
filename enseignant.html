<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pointage — Cyber Poly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-slate-100 min-h-screen">

<!-- Sidebar -->
<aside class="w-64 min-h-screen bg-white border-r border-slate-200 fixed left-0 top-0 flex flex-col z-50">
    <div class="px-6 py-6 border-b border-slate-100">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg bg-[#1e5aa8] flex items-center justify-center">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
            </div>
            <div>
                <div class="text-sm font-bold text-slate-900 tracking-tight">Cyber Poly</div>
                <div class="text-[11px] text-slate-500 font-medium">Gestion des Présences</div>
            </div>
        </div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-0.5">
        <div class="px-3 mb-2"><span class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider">Enseignant</span></div>
        <a href="/enseignant" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium bg-[#1e5aa8]/10 text-[#1e5aa8]">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="m9 16 2 2 4-4"/></svg>
            Pointage
        </a>
        <a href="#" onclick="alert('À venir'); return false;" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
            Historique
        </a>
    </nav>
    <div class="p-4 border-t border-slate-100 mx-3 mb-3">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center">
                <span class="text-xs font-semibold text-slate-600" id="userInitial">U</span>
            </div>
            <div class="flex-1 min-w-0">
                <div class="text-sm font-medium text-slate-900 truncate" id="userName">—</div>
                <div class="text-[11px] text-slate-500 truncate" id="userEmail">—</div>
            </div>
            <button onclick="logout()" class="p-1.5 rounded-md text-slate-400 hover:text-red-500 hover:bg-red-50 transition-colors" title="Déconnexion">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
            </button>
        </div>
    </div>
</aside>

<!-- Main -->
<main class="ml-64 p-8">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Pointage des présences</h1>
        <p class="text-sm text-slate-500 mt-1" id="dateStr">—</p>
    </div>

    <!-- Info -->
    <div id="infoBox" class="hidden mb-6 px-4 py-3 rounded-lg border text-sm font-medium flex items-center gap-2"></div>

    <!-- Session Select -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200/60 p-5 mb-6">
        <label class="block text-sm font-medium text-slate-700 mb-2">Séance</label>
        <select id="seanceSelect" onchange="loadPresences()" class="w-full max-w-md px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-[#1e5aa8]/20 focus:border-[#1e5aa8]">
            <option value="">Choisir une séance...</option>
        </select>
    </div>

    <!-- Content -->
    <div id="contentArea" class="hidden">
        <!-- Stats -->
        <div class="grid grid-cols-4 gap-4 mb-6" id="statsRow"></div>

        <!-- Actions -->
        <div class="flex flex-wrap gap-2 mb-5">
            <button onclick="setAll('present')" class="px-4 py-2 bg-emerald-50 text-emerald-700 text-sm font-medium rounded-lg border border-emerald-200 hover:bg-emerald-100 transition-colors">Tous présents</button>
            <button onclick="setAll('justifie')" class="px-4 py-2 bg-amber-50 text-amber-700 text-sm font-medium rounded-lg border border-amber-200 hover:bg-amber-100 transition-colors">Tous justifiés</button>
            <button onclick="setAll('absent')" class="px-4 py-2 bg-red-50 text-red-700 text-sm font-medium rounded-lg border border-red-200 hover:bg-red-100 transition-colors">Tous absents</button>
        </div>

        <!-- Search -->
        <div class="flex flex-wrap gap-3 items-center mb-5">
            <div class="flex-1 min-w-[240px] relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="searchInput" onkeyup="filterStudents()" placeholder="Rechercher par nom ou matricule..." class="w-full pl-9 pr-3 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#1e5aa8]/20 focus:border-[#1e5aa8]">
            </div>
            <div class="flex gap-1 bg-white p-1 rounded-lg border border-slate-200" id="filterBtns">
                <button onclick="setFilter('all')" class="filter-btn px-3 py-1.5 text-xs font-medium rounded-md bg-[#1e5aa8] text-white" data-filter="all">Tous</button>
                <button onclick="setFilter('present')" class="filter-btn px-3 py-1.5 text-xs font-medium rounded-md text-slate-500 hover:text-slate-700 hover:bg-slate-50" data-filter="present">Présents</button>
                <button onclick="setFilter('absent')" class="filter-btn px-3 py-1.5 text-xs font-medium rounded-md text-slate-500 hover:text-slate-700 hover:bg-slate-50" data-filter="absent">Absents</button>
                <button onclick="setFilter('justifie')" class="filter-btn px-3 py-1.5 text-xs font-medium rounded-md text-slate-500 hover:text-slate-700 hover:bg-slate-50" data-filter="justifie">Justifiés</button>
            </div>
        </div>

        <!-- List -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200/60 overflow-hidden">
            <div id="studentsList" class="divide-y divide-slate-100"></div>
        </div>

        <!-- Save -->
        <button onclick="saveAll()" id="saveBtn" class="w-full mt-5 py-3 bg-[#1e5aa8] text-white text-sm font-semibold rounded-xl hover:bg-[#164785] focus:outline-none focus:ring-2 focus:ring-[#1e5aa8]/30 transition-all flex items-center justify-center gap-2">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Enregistrer les modifications
        </button>
    </div>
</main>

<script>
const API = 'http://localhost:3000/api';
let token = null;
let seanceId = null;
let students = [];
let mods = {};
let currentFilter = 'all';

const ICONS = {
    search: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>',
    check: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    x: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>',
    file: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>',
    upload: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>',
    save: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>'
};

function init() {
    token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token || user.role !== 'enseignant') { window.location.href = '/'; return; }

    document.getElementById('userName').textContent = user.nom;
    document.getElementById('userEmail').textContent = user.email;
    document.getElementById('userInitial').textContent = (user.nom || 'U').charAt(0).toUpperCase();
    document.getElementById('dateStr').textContent = new Date().toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    loadSeances();
}

async function api(url, opts = {}) {
    const res = await fetch(`${API}${url}`, {
        ...opts,
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...opts.headers }
    });
    if (res.status === 401) { logout(); return; }
    return res.json();
}

async function loadSeances() {
    const data = await api('/seances');
    const seances = Array.isArray(data) ? data : [];
    const sel = document.getElementById('seanceSelect');
    const fmtTime = (t) => t ? t.substring(0, 5) : '';
    sel.innerHTML = '<option value="">Choisir une séance...</option>' + seances.map(s => {
        const timeStr = s.heure_debut ? ` (${fmtTime(s.heure_debut)}–${fmtTime(s.heure_fin)})` : '';
        return `<option value="${s.id}">${s.date_seance}${timeStr} — ${s.description}</option>`;
    }).join('');
    showInfo(`${seances.length} séance(s) disponible(s)`, 'info');
}

async function loadPresences() {
    seanceId = document.getElementById('seanceSelect').value;
    if (!seanceId) { document.getElementById('contentArea').classList.add('hidden'); return; }
    mods = {};
    const data = await api(`/presences/${seanceId}`);
    students = Array.isArray(data) ? data : [];
    document.getElementById('contentArea').classList.remove('hidden');
    showInfo(`${students.length} étudiant(s) chargé(s).`, 'info');
    renderAll();
}

function getStatus(e) {
    if (mods[e.id]) return mods[e.id];
    if (e.present === 1) return 'present';
    if (e.present === 0 && e.justificatif_valide === 1) return 'justifie';
    return 'absent';
}

function renderAll() {
    renderStats();
    renderList();
}

function renderStats() {
    const total = students.length;
    const p = students.filter(e => getStatus(e) === 'present').length;
    const j = students.filter(e => getStatus(e) === 'justifie').length;
    const a = students.filter(e => getStatus(e) === 'absent').length;

    const bar = (val, color, bg) => `<div class="mt-2 h-1 ${bg} rounded-full overflow-hidden"><div class="h-full ${color} rounded-full" style="width:${total?((val/total)*100):0}%"></div></div>`;

    document.getElementById('statsRow').innerHTML = `
        <div class="bg-white rounded-xl shadow-sm border border-slate-200/60 p-4"><div class="text-xs font-medium text-slate-500 mb-1">Total</div><div class="text-2xl font-bold text-slate-900">${total}</div>${bar(total,'bg-slate-400','bg-slate-100')}</div>
        <div class="bg-white rounded-xl border border-emerald-200/60 shadow-sm p-4"><div class="text-xs font-medium text-emerald-600 mb-1">Présents</div><div class="text-2xl font-bold text-emerald-700">${p}</div>${bar(p,'bg-emerald-500','bg-emerald-100')}</div>
        <div class="bg-white rounded-xl border border-amber-200/60 shadow-sm p-4"><div class="text-xs font-medium text-amber-600 mb-1">Justifiés</div><div class="text-2xl font-bold text-amber-700">${j}</div>${bar(j,'bg-amber-400','bg-amber-100')}</div>
        <div class="bg-white rounded-xl border border-red-200/60 shadow-sm p-4"><div class="text-xs font-medium text-red-600 mb-1">Absents</div><div class="text-2xl font-bold text-red-700">${a}</div>${bar(a,'bg-red-400','bg-red-100')}</div>
    `;
}

function renderList() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    let list = students.filter(e => {
        if (search && !(`${e.nom} ${e.prenom}`.toLowerCase().includes(search) || e.matricule.toLowerCase().includes(search))) return false;
        if (currentFilter !== 'all' && getStatus(e) !== currentFilter) return false;
        return true;
    });

    const statusColors = { present: 'bg-emerald-500', justifie: 'bg-amber-400', absent: 'bg-red-400' };
    const statusLabels = { present: 'Présent', justifie: 'Justifié', absent: 'Absent' };

    const div = document.getElementById('studentsList');
    if (list.length === 0) { div.innerHTML = '<div class="p-10 text-center text-sm text-slate-400">Aucun étudiant trouvé</div>'; return; }

    div.innerHTML = list.map(e => {
        const status = getStatus(e);
        const modified = mods[e.id];

        let badge = '';
        if (e.justificatif && e.justificatif_valide === 1) badge = '<span class="inline-flex items-center gap-1 px-2 py-0.5 bg-emerald-50 text-emerald-700 text-[10px] font-semibold rounded-full border border-emerald-200">Validé</span>';
        else if (e.justificatif && e.justificatif_valide === 0) badge = '<span class="inline-flex items-center gap-1 px-2 py-0.5 bg-red-50 text-red-700 text-[10px] font-semibold rounded-full border border-red-200">Rejeté</span>';
        else if (e.justificatif) badge = '<span class="inline-flex items-center gap-1 px-2 py-0.5 bg-amber-50 text-amber-700 text-[10px] font-semibold rounded-full border border-amber-200">En attente</span>';

        return `<div class="px-5 py-4 ${modified?'bg-amber-50/50':''} transition-colors">
            <div class="flex flex-wrap items-center gap-4">
                <div class="flex items-center gap-3 flex-1 min-w-[200px]">
                    <div class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-sm font-semibold text-slate-500">${e.prenom.charAt(0)}${e.nom.charAt(0)}</div>
                    <div>
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="text-sm font-semibold text-slate-900">${e.nom} ${e.prenom}</span>
                            <span class="text-[10px] font-medium text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded">${e.matricule}</span>
                            ${badge}
                            ${modified?'<span class="text-[10px] font-medium text-amber-600 bg-amber-100 px-1.5 py-0.5 rounded">Modifié</span>':''}
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full ${statusColors[status]}"></div>
                    <span class="text-xs font-medium text-slate-500 w-14">${statusLabels[status]}</span>
                </div>
                <div class="flex items-center gap-1.5">
                    ${['present','justifie','absent'].map(s => {
                        const active = status === s;
                        const colors = s==='present'?['bg-emerald-500 text-white border-emerald-500','bg-white text-slate-500 border-slate-200 hover:bg-slate-50']:
                                       s==='justifie'?['bg-amber-400 text-white border-amber-400','bg-white text-slate-500 border-slate-200 hover:bg-slate-50']:
                                       ['bg-red-400 text-white border-red-400','bg-white text-slate-500 border-slate-200 hover:bg-slate-50'];
                        return `<button onclick="setStatus(${e.id},'${s}')" class="px-3 py-1.5 text-xs font-medium rounded-lg border transition-all ${active?colors[0]:colors[1]}">${s==='present'?'Présent':s==='justifie'?'Justifié':'Absent'}</button>`;
                    }).join('')}
                    <button onclick="uploadJustif(${e.id})" class="ml-1 p-1.5 text-slate-400 hover:text-[#1e5aa8] hover:bg-blue-50 rounded-lg transition-colors" title="Envoyer un justificatif">${ICONS.upload}</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function setStatus(id, status) {
    mods[id] = status;
    showInfo('Modifications non enregistrées. N\'oubliez pas de sauvegarder.', 'warning');
    renderAll();
}

function setAll(status) {
    students.forEach(e => mods[e.id] = status);
    showInfo('Tous les étudiants ont été marqués. Cliquez sur Sauvegarder.', 'warning');
    renderAll();
}

function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
        if (b.dataset.filter === filter) { b.className = 'filter-btn px-3 py-1.5 text-xs font-medium rounded-md bg-[#1e5aa8] text-white'; }
        else { b.className = 'filter-btn px-3 py-1.5 text-xs font-medium rounded-md text-slate-500 hover:text-slate-700 hover:bg-slate-50'; }
    });
    renderList();
}

function filterStudents() { renderList(); }

async function uploadJustif(etudiantId) {
    const motif = prompt("Motif de l'absence :", "Maladie / Accident / Raison familiale");
    if (!motif) return;
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.pdf,.jpg,.png';
    input.onchange = async (ev) => {
        const file = ev.target.files[0]; if (!file) return;
        const etudiant = students.find(e => e.id === etudiantId);
        const fd = new FormData();
        fd.append('fichier', file);
        fd.append('presence_id', etudiant?.presence_id || '');
        fd.append('etudiant_id', String(etudiantId));
        fd.append('seance_id', seanceId);
        fd.append('motif', motif);
        await fetch(`${API}/upload-justificatif`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: fd });
        showInfo('Justificatif envoyé ! En attente de validation.', 'success');
        mods[etudiantId] = 'justifie';
        renderAll();
    };
    input.click();
}

async function saveAll() {
    const presences = students.map(e => {
        const s = mods[e.id];
        let present = 0;
        if (!s) { if (e.present === 1) present = 1; }
        else if (s === 'present') present = 1;
        return { etudiant_id: e.id, present };
    });
    const presents = presences.filter(p => p.present === 1).length;
    if (!confirm(`Confirmer ?\nPrésents: ${presents}\nAbsents: ${presences.length - presents}`)) return;

    const btn = document.getElementById('saveBtn');
    btn.innerHTML = 'Enregistrement...'; btn.disabled = true;
    await api('/presences', { method: 'POST', body: JSON.stringify({ seance_id: Number(seanceId), presences }) });
    mods = {};
    showInfo('Modifications enregistrées avec succès !', 'success');
    students = await api(`/presences/${seanceId}`);
    renderAll();
    btn.innerHTML = `${ICONS.save} Enregistrer les modifications`; btn.disabled = false;
}

function showInfo(msg, type) {
    const box = document.getElementById('infoBox');
    const colors = type==='success'?'bg-emerald-50 border-emerald-200 text-emerald-700':type==='warning'?'bg-amber-50 border-amber-200 text-amber-700':'bg-blue-50 border-blue-200 text-blue-700';
    const icon = type==='success'?ICONS.check:type==='warning'?'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>':'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>';
    box.className = `mb-6 px-4 py-3 rounded-lg border text-sm font-medium flex items-center gap-2 ${colors}`;
    box.innerHTML = icon + ' ' + msg;
    box.classList.remove('hidden');
}

function logout() { localStorage.clear(); window.location.href = '/'; }

init();
</script>
</body>
</html>
